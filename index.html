<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Document</title>
  </head>
  <body>
    <!-- * JSX bebel -->
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- * react and react-dom -->
    <script crossorigin src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>

    <style>
      :root {
        --popup-nav-height: 70px;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      #root {
        display: flex;
        justify-content: center;
        width: 100%;
        background-color: #f9f9f9;
      }

      #root * {
        box-sizing: border-box;
      }

      .yummy-popup.yummy-show {
        display: initial;
      }

      .yummy-popup {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        display: none;
        overflow: hidden;
        background-color: #f9f9f9;
      }

      .yummy-popup-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        height: var(--popup-nav-height);
        padding: 0 20px;
        background-color: #363430;
        color: #fff;
      }

      .yummy-popup-nav-hide {
        cursor: pointer;
      }

      .yummy-popup-main {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        height: calc(100% - var(--popup-nav-height) - 53px);
        overflow-x: hidden;
        overflow-y: auto;
      }

      .yummy-select {
        position: relative;
        display: flex;
        flex-grow: 1;
        height: 31px;
        min-width: 80px;
        border: 1px solid #ddd;
        border-radius: 2px;
        padding-right: 35px;
      }

      .yummy-select > svg {
        position: absolute;
        top: 50%;
        right: 12px;
        z-index: 1;
        transform: translateY(-50%);
      }

      .yummy-select > select {
        width: 100%;
        height: 100%;
        border: none;
        outline: none;
        appearance: none;
        text-align-last: center;
      }

      .yummy-select::after {
        content: '';
        position: absolute;
        top: -1px;
        right: 0;
        width: 35px;
        height: 31px;
        border-radius: 0 2px 2px 0;
        background-color: #89a74d;
        pointer-events: none;
      }

      .yummy-upload {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: space-between;
      }

      .yummy-upload > label {
        display: flex;
        flex-direction: column;
        border-radius: 2px;
        padding: 4px 16px;
        background-color: #89a74d;
        font-size: 16px;
        font-weight: bold;
        color: white;
        text-align: center;
        cursor: pointer;
      }

      .yummy-upload-img-list {
        display: flex;
        margin: 0;
        padding: 0;
      }

      .yummy-upload-img-list > li {
        position: relative;
        margin: 0;
        padding: 0 15px 0 0;
        list-style-type: none;
      }

      .yummy-upload-img-list-close {
        position: absolute;
        top: -6px;
        right: 5px;
        display: flex;
        justify-content: center;
        width: 21px;
        height: 21px;
        border: 1px solid gray;
        border-radius: 50%;
        background-color: #fff;
        line-height: 16px;
        color: black;
        cursor: pointer;
      }
    </style>
    <div id="root"></div>

    <!-- ? PopupStoreCredit Component -->
    <style>
      .popup-store-credit {
        width: 900px;
      }

      .popup-store-credit-title {
        margin: 50px 0 16px 0;
        font-size: 30px;
        font-weight: bold;
      }

      .popup-store-credit-info {
        display: flex;
        flex-direction: column;
        margin-bottom: 50px;
      }

      .popup-store-credit-info-item {
        display: flex;
        height: 22px;
        line-height: 22px;
      }

      .popup-store-credit-info-item > label {
        margin-right: 5px;
        font-weight: 300;
      }

      .popup-store-credit-info-item > div {
        font-weight: bold;
      }

      .popup-store-credit-info-item:not(.popup-store-credit-info-item:nth-last-of-type(1)) {
        margin-bottom: 7px;
      }

      .popup-store-credit-package {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }

      .popup-store-credit-package-title {
        position: relative;
        font-size: 30px;
        font-weight: bold;
      }

      .popup-store-credit-package-title::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 1px;
        background-color: #000;
      }

      .popup-store-credit-package-info {
        margin: 7px 0 15px 0;
      }

      .popup-store-credit-package-info-item {
        display: flex;
        width: 365px;
        height: 31px;
        line-height: 31px;
      }

      .popup-store-credit-package-info-item > label {
        flex-shrink: 0;
        margin-right: 10px;
        font-weight: 300;
      }

      .popup-store-credit-package-info-item > div {
        font-weight: bold;
      }

      .popup-store-credit-package-info-item:not(.popup-store-credit-package-info-item:nth-last-of-type(1)) {
        margin-bottom: 10px;
      }

      .popup-store-credit-package-conditions {
        margin-bottom: 16px;
        width: 100%;
        height: 170px;
        box-shadow: 0 0 3px 1px #e4e0e0;
        background-color: #fff;
      }

      .popup-store-credit-package-conditions-title {
        display: flex;
        align-items: center;
        height: 35px;
        border-bottom: 1px solid #efefef;
        padding: 0 16px;
        font-weight: bold;
      }

      .popup-store-credit-package-conditions-content {
        display: flex;
        justify-content: space-between;
        height: calc(100% - 35px);
        padding: 12px 8px;
      }

      .popup-store-credit-package-conditions-content-tips {
        display: flex;
      }

      .popup-store-credit-package-conditions-content-tips > div {
        display: flex;
        flex-direction: column;
        font-size: 14px;
      }

      .popup-store-credit-package-conditions-content-tips > div:nth-of-type(1) {
        margin-right: 40px;
        width: 114px;
      }

      .popup-store-credit-package-conditions-content-tips > div:nth-of-type(2) {
        margin-right: 40px;
        width: 90px;
      }

      .popup-store-credit-package-conditions-content-tips > div:nth-of-type(3) {
        margin-right: 5px;
        width: 120px;
      }

      .popup-store-credit-package-conditions-content-tips > div > img {
        margin-top: 7px;
      }

      .popup-store-credit-package-affected-item {
        margin-bottom: 100px;
        width: 100%;
        height: 170px;
        box-shadow: 0 0 3px 1px #e4e0e0;
        background-color: #fff;
      }

      .popup-store-credit-package-affected-item-title {
        display: flex;
        align-items: center;
        height: 35px;
        border-bottom: 1px solid #efefef;
        padding: 0 16px;
        font-weight: bold;
      }

      .popup-store-credit-submit-bar {
        position: fixed;
        right: 0;
        bottom: 0;
        left: 0;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        width: 100%;
        height: 59px;
        padding: 0 35px;
        box-shadow: 0 -3px 2px 0 #e4e0e0;
        background-color: #fff;
      }

      .popup-store-credit-submit-bar > div {
        margin-right: 35px;
      }

      .popup-store-credit-submit-bar > button {
        width: 190px;
        height: 37px;
        border: none;
        border-radius: 2px;
        background-color: #89a74d;
        font-size: 18px;
        font-weight: bold;
        color: white;
        text-align: center;
        text-decoration: none;
        cursor: pointer;
        -webkit-appearance: none;
      }

      .popup-store-credit-submit-bar > button.disabled {
        background-color: #bcbcbc;
        cursor: not-allowed;
      }
    </style>
    <script type="text/babel" src="./src/PopupStoreCredit.js"></script>

    <!-- ? PopupSubmitted Component -->
    <style>
      .popup-submitted {
        margin-top: 50px;
        width: 900px;
      }
    </style>
    <script type="text/babel" src="./src/PopupSubmitted.js"></script>

    <!-- ? PopupCheckStates Component -->
    <style>
      .popup-check-states {
        margin-top: 50px;
        width: 900px;
      }
    </style>
    <script type="text/babel" src="./src/PopupCheckStates.js"></script>

    <!-- ! ClaimSearch Component -->
    <style>
      .claim-search {
        display: grid;
        grid-template: 220px 122px / 1fr 1fr;
        width: 900px;
        padding: 45px 0 22px 0;
      }

      .claim-search-left,
      .claim-search-right {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
      }

      .claim-search-left {
        margin: 0 16px 10px 0;
      }

      .claim-search-right {
        margin: 0 0 10px 16px;
      }

      .claim-search-left-title,
      .claim-search-right-title {
        font-size: 24px;
        font-weight: bold;
      }

      .claim-search-left > form,
      .claim-search-right > form {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        justify-content: space-between;
        height: 170px;
        padding: 18px 42px;
        box-shadow: 0 0 3px 1px #e4e0e0;
        background-color: #fff;
        align-self: stretch;
      }

      .claim-search-form-item > label {
        padding-right: 10px;
        font-size: 16px;
      }

      .claim-search-form-item > input {
        height: 37px;
      }

      .claim-search-form-item > input:not([type='submit']) {
        width: 242px;
      }

      .claim-search-form-item > input[type='submit'] {
        width: 110px;
        border: none;
        border-radius: 2px;
        background-color: #89a74d;
        font-size: 18px;
        font-weight: bold;
        color: white;
        text-align: center;
        text-decoration: none;
      }

      .claim-search-bottom {
        display: grid;
        grid-area: 2 / 1 / span 1 / span 2;
        grid-template: 1fr 10px 1fr / 1fr 1fr 1fr;
        margin-top: 10px;
        padding: 24px 70px;
        box-shadow: 0 0 3px 1px #e4e0e0;
        background-color: #fff;
        font-size: 18px;
      }

      .claim-search-bottom > div {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .claim-search-bottom > div:nth-of-type(1) {
        grid-area: 1 / 1 / span 3 / span 1;
        font-weight: bold;
      }

      .claim-search-bottom > div:nth-of-type(2) {
        grid-area: 1 / 2 / span 1 / span 1;
      }

      .claim-search-bottom > div:nth-of-type(3) {
        grid-area: 1 / 3 / span 1 / span 1;
      }

      .claim-search-bottom > div:nth-of-type(4) {
        grid-area: 3 / 2 / span 1 / span 1;
        font-weight: bold;
      }

      .claim-search-bottom > div:nth-of-type(5) {
        grid-area: 3 / 3 / span 1 / span 1;
        font-weight: bold;
      }
    </style>
    <script type="text/babel" src="./src/ClaimSearch.js"></script>

    <!-- ! App Component -->
    <script type="text/babel" src="./src/App.js"></script>
  </body>
</html>
